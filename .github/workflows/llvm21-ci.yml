name: llvm21-ci

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout SVF
        uses: actions/checkout@v4

      - name: Checkout Test-Suite
        uses: actions/checkout@v4
        with:
          repository: cjsrxzdyzds/Test-Suite
          ref: e24103a
          path: Test-Suite

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            curl \
            git \
            libncurses5-dev \
            libtinfo-dev \
            libz3-dev \
            ninja-build \
            software-properties-common \
            wget \
            xz-utils \
            zlib1g-dev

      - name: Install LLVM 21
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get install -y clang-21 lld-21 llvm-21-dev

      - name: Configure
        run: |
          cmake -S . -B build-llvm21 -G Ninja \
            -DCMAKE_C_COMPILER=clang-21 \
            -DCMAKE_CXX_COMPILER=clang++-21 \
            -DLLVM_DIR=/usr/lib/llvm-21/lib/cmake/llvm

      - name: Build
        run: cmake --build build-llvm21 --parallel

      - name: Test
        working-directory: build-llvm21
        run: ctest --output-on-failure
